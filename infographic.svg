<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#140020"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0028" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d0018" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a855f720"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="70" x2="860" y2="70"/>
    <line x1="0" y1="140" x2="860" y2="140"/>
    <line x1="0" y1="210" x2="860" y2="210"/>
    <line x1="0" y1="280" x2="860" y2="280"/>
    <line x1="0" y1="350" x2="860" y2="350"/>
    <line x1="172" y1="0" x2="172" y2="420"/>
    <line x1="344" y1="0" x2="344" y2="420"/>
    <line x1="516" y1="0" x2="516" y2="420"/>
    <line x1="688" y1="0" x2="688" y2="420"/>
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="860" height="3" fill="url(#purple)"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Fine-tune Dataset Quality Scorer</text>
  <text x="430" y="56" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a855f780">Automated quality scoring pipeline for LLM fine-tuning datasets</text>

  <!-- Pipeline nodes -->
  <!-- Node 1: Dataset Input -->
  <rect x="20" y="90" width="140" height="130" rx="10" fill="url(#card)" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#a855f7">📂</text>
  <text x="90" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Dataset Input</text>
  <text x="90" y="156" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#a855f799">JSONL / JSON / CSV</text>
  <text x="90" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">instruction-response</text>
  <text x="90" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">pairs format</text>
  <text x="90" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">streaming load</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="155" x2="188" y2="155" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2: Metrics Engine -->
  <rect x="190" y="90" width="140" height="130" rx="10" fill="url(#card)" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#9333ea">🔬</text>
  <text x="260" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Metrics Engine</text>
  <text x="260" y="156" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#9333ea99">7 quality dimensions</text>
  <text x="260" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">length ratios</text>
  <text x="260" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">diversity scoring</text>
  <text x="260" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">dedup detection</text>

  <!-- Arrow 2→3 -->
  <line x1="332" y1="155" x2="358" y2="155" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 3: Scorer -->
  <rect x="360" y="90" width="140" height="130" rx="10" fill="url(#card)" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#a855f7">⭐</text>
  <text x="430" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Quality Scorer</text>
  <text x="430" y="156" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#a855f799">0–100 score</text>
  <text x="430" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">weighted formula</text>
  <text x="430" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">per-sample scores</text>
  <text x="430" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">grade assignment</text>

  <!-- Arrow 3→4 -->
  <line x1="502" y1="155" x2="528" y2="155" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 4: Issue Detector -->
  <rect x="530" y="90" width="140" height="130" rx="10" fill="url(#card)" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#9333ea">🚨</text>
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Issue Detector</text>
  <text x="600" y="156" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#9333ea99">actionable flags</text>
  <text x="600" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">empty responses</text>
  <text x="600" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">format violations</text>
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">near-duplicates</text>

  <!-- Arrow 4→5 -->
  <line x1="672" y1="155" x2="698" y2="155" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 5: Report -->
  <rect x="700" y="90" width="140" height="130" rx="10" fill="url(#card)" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#a855f7">📋</text>
  <text x="770" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Report Output</text>
  <text x="770" y="156" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#a855f799">CLI + JSON + HTML</text>
  <text x="770" y="172" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">grade summary</text>
  <text x="770" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">fix recommendations</text>
  <text x="770" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff80">sample examples</text>

  <!-- Grade bands -->
  <rect x="20" y="248" width="820" height="60" rx="8" fill="#1a002880" stroke="#a855f730" stroke-width="1"/>
  <text x="430" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#a855f7aa" letter-spacing="2">DATASET QUALITY GRADES</text>

  <rect x="40" y="278" width="140" height="18" rx="4" fill="#ef444440" stroke="#ef444460" stroke-width="1"/>
  <text x="110" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ef4444">F · 0–49 · Reject</text>

  <rect x="196" y="278" width="140" height="18" rx="4" fill="#f9731440" stroke="#f9731460" stroke-width="1"/>
  <text x="266" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f97316">D · 50–59 · Review</text>

  <rect x="352" y="278" width="140" height="18" rx="4" fill="#eab30840" stroke="#eab30860" stroke-width="1"/>
  <text x="422" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#eab308">C · 60–74 · Usable</text>

  <rect x="508" y="278" width="140" height="18" rx="4" fill="#22c55e40" stroke="#22c55e60" stroke-width="1"/>
  <text x="578" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#22c55e">B · 75–89 · Good</text>

  <rect x="664" y="278" width="140" height="18" rx="4" fill="#a855f740" stroke="#a855f760" stroke-width="1"/>
  <text x="734" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#a855f7">A · 90–100 · Excellent</text>

  <!-- Stats row -->
  <g transform="translate(20, 330)">
    <rect width="192" height="68" rx="8" fill="#1a002880" stroke="#a855f720" stroke-width="1"/>
    <text x="96" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#a855f7">Dimensions</text>
    <text x="96" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">7 metrics</text>
    <text x="96" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff60">weighted scoring</text>
  </g>
  <g transform="translate(224, 330)">
    <rect width="192" height="68" rx="8" fill="#1a002880" stroke="#a855f720" stroke-width="1"/>
    <text x="96" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#9333ea">Throughput</text>
    <text x="96" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">10K+ rows</text>
    <text x="96" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff60">streaming support</text>
  </g>
  <g transform="translate(428, 330)">
    <rect width="192" height="68" rx="8" fill="#1a002880" stroke="#a855f720" stroke-width="1"/>
    <text x="96" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#a855f7">Interfaces</text>
    <text x="96" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">CLI + API</text>
    <text x="96" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff60">Python importable</text>
  </g>
  <g transform="translate(632, 330)">
    <rect width="208" height="68" rx="8" fill="#1a002880" stroke="#a855f720" stroke-width="1"/>
    <text x="104" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#9333ea">Test Coverage</text>
    <text x="104" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">55 tests</text>
    <text x="104" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffffff60">pytest suite</text>
  </g>
</svg>
