# Fine-tune Dataset Quality Scorer Configuration

# Score weights (must sum to 1.0)
# These determine how much each check contributes to the overall score.
weights:
  json_format: 0.10
  field_consistency: 0.20
  missing_values: 0.20
  duplicates: 0.15
  near_duplicates: 0.10
  text_length: 0.10
  label_quality: 0.15

# Thresholds for individual checks
thresholds:
  # Field consistency (fraction of records that have ALL expected fields)
  field_consistency_pass: 0.95   # >= 95% → full pass
  field_consistency_soft: 0.80   # 80-95% → soft pass (score penalised)

  # Missing / empty values (fraction of present field values that are non-empty)
  missing_values_pass: 0.95      # >= 95% completeness → full pass
  missing_values_soft: 0.80      # 80-95% → soft pass (score penalised)

  # Exact deduplication (fraction of records that are unique)
  duplicate_soft: 0.90           # >= 90% unique → soft pass

  # Near-duplicate detection (Jaccard word-set similarity)
  near_duplicate_similarity: 0.85  # pairs above this threshold are flagged
  near_duplicate_sample: 500       # max records compared (for performance)

  # Text length (in words, applied to primary text / instruction field)
  min_text_words: 3
  max_text_words: 2000

# Score bands (used for the grade label and recommendations)
score_bands:
  ready: 90        # >= 90 → READY for fine-tuning
  caution: 75      # 75-89 → CAUTION: minor issues
  needs_work: 50   # 50-74 → NEEDS WORK: significant issues
                   # < 50  → NOT READY: critical issues
